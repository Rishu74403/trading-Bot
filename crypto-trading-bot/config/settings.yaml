# ============================================================
#  Crypto Trading Bot — Configuration
# ============================================================

# Exchange settings
exchange: binance
trading_pair: BTC/USDT
timeframe: 1h            # 1m, 5m, 15m, 1h, 4h, 1d

# Capital & risk management
initial_capital: 10000.0  # Starting capital in quote currency (USDT)
fee_rate: 0.001           # 0.1% trading fee per trade
slippage: 0.0005          # 0.05% simulated slippage
risk_per_trade: 0.02      # Risk 2% of portfolio per trade

# Default strategy
strategy: sma_crossover   # sma_crossover, rsi, macd, bollinger_bands

# Strategy parameters
strategies:
  sma_crossover:
    fast_period: 20
    slow_period: 50

  rsi:
    period: 14
    oversold: 30
    overbought: 70

  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9

  bollinger_bands:
    period: 20
    std_dev: 2.0

# Risk management
stop_loss: 0.05           # 5% stop loss
take_profit: 0.10         # 10% take profit

# Paper trading
paper_trade:
  update_interval: 60     # seconds between data fetches

# Logging
log_level: INFO
log_file: logs/trading.log

# Dashboard
dashboard:
  host: 127.0.0.1
  port: 5000
  debug: false
